<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedidos — Admin Falcon</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/layout.css">
</head>
<body>
  <div class="sidebar-overlay" id="overlay"></div>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo"><span class="eagle">🦅</span><div><div class="brand">Falcon Portal</div><div class="tagline">Panel Administrativo</div></div></div>
      <nav class="sidebar-nav">
        <div class="nav-section">Administración</div>
        <a href="admin.html" class="nav-link"><span class="icon">📊</span> Dashboard</a>
        <a href="admin-orders.html" class="nav-link active"><span class="icon">📋</span> Pedidos</a>
        <a href="admin-distributors.html" class="nav-link"><span class="icon">👥</span> Distribuidores</a>
        <div class="nav-section">Módulos</div>
        <a href="whatsapp.html" class="nav-link"><span class="icon">💬</span> WhatsApp</a>
        <a href="impact.html" class="nav-link"><span class="icon">🌿</span> Impacto Ambiental</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info"><strong id="userName">...</strong><span>Administrador</span></div>
        <button class="btn btn-outline btn-sm btn-full" id="logoutBtn">Cerrar sesión</button>
      </div>
    </aside>

    <div class="main-content">
      <div class="top-bar">
        <button class="hamburger" id="hamburger">☰</button>
        <h1>Todos los Pedidos</h1>
      </div>
      <div class="page-content">
        <div id="loading" style="text-align:center;padding:3rem"><span class="spinner"></span></div>
        <div id="content" style="display:none" class="card">
          <div class="table-wrap">
            <table>
              <thead><tr><th>Fecha</th><th>ID</th><th>Distribuidor</th><th>Zona</th><th>Items</th><th>Total</th><th>Estado</th></tr></thead>
              <tbody id="ordersTable"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from './js/auth.js'
    import { api } from './js/api.js'

    const user = requireAuth('admin')
    if (!user) return

    document.getElementById('userName').textContent = user.name || user.email
    document.getElementById('logoutBtn').addEventListener('click', logout)

    const hamburger = document.getElementById('hamburger')
    const sidebar = document.getElementById('sidebar')
    const overlay = document.getElementById('overlay')
    hamburger.addEventListener('click', () => { sidebar.classList.toggle('open'); overlay.classList.toggle('open') })
    overlay.addEventListener('click', () => { sidebar.classList.remove('open'); overlay.classList.remove('open') })

    const statuses = ['pendiente','confirmado','en_camino','entregado','cancelado']

    async function changeStatus(orderId, status) {
      try { await api.patch(`/admin/orders/${orderId}/status`, { status }) }
      catch (e) { alert('Error: ' + e.message) }
    }

    try {
      const orders = await api.get('/admin/orders')
      const tbody = document.getElementById('ordersTable')

      if (!orders.length) {
        tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><p>Sin pedidos aún</p></div></td></tr>'
      } else {
        tbody.innerHTML = orders.map(o => `
          <tr>
            <td>${new Date(o.createdAt).toLocaleDateString('es-CR')}</td>
            <td style="font-family:monospace;font-size:.82rem">${o._id.slice(-6).toUpperCase()}</td>
            <td>${o.distributorName || o.distribuidor?.name || '—'}</td>
            <td>${o.distributorZone || o.distribuidor?.zone || '—'}</td>
            <td>${o.items.length}</td>
            <td style="font-weight:600">₡${(o.total||0).toLocaleString('es-CR')}</td>
            <td>
              <select onchange="window.handleStatus('${o._id}', this.value)" style="padding:.3rem .6rem;border-radius:4px;border:1.5px solid var(--gray-100);font-size:.85rem">
                ${statuses.map(s => `<option value="${s}"${s===o.status?' selected':''}>${s.replace('_',' ')}</option>`).join('')}
              </select>
            </td>
          </tr>`).join('')
      }

      window.handleStatus = changeStatus
      document.getElementById('loading').style.display = 'none'
      document.getElementById('content').style.display = 'block'
    } catch (e) {
      document.getElementById('loading').innerHTML = `<div class="alert alert-error">${e.message}</div>`
    }
  </script>
</body>
</html>
