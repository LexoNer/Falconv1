<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falcon Portal — Ingresar</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body { background: var(--forest); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-box { background: white; border-radius: var(--radius-lg); padding: 2.5rem 2rem; width: 100%; max-width: 400px; box-shadow: var(--shadow-lg); }
    .logo { text-align: center; margin-bottom: 2rem; }
    .logo .eagle { font-size: 3rem; line-height: 1; }
    .logo h1 { font-family: var(--font-serif); font-size: 1.6rem; color: var(--forest); margin-top: .5rem; }
    .logo p { font-size: .85rem; color: var(--gray-600); margin-top: .25rem; }
    .demo-hint { background: var(--lime-light); border-radius: var(--radius); padding: .85rem 1rem; margin-bottom: 1.25rem; font-size: .85rem; color: var(--forest); }
    .demo-hint strong { display: block; margin-bottom: .25rem; }
    .demo-hint code { background: white; padding: .1rem .4rem; border-radius: 4px; font-size: .82rem; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <div class="eagle">🦅</div>
      <h1>Falcon Portal</h1>
      <p>Red de distribuidores autorizados</p>
    </div>

    <div class="demo-hint">
      <strong>Acceso demo</strong>
      Admin: <code>admin@falcon.cr</code> / <code>admin123</code><br>
      Distribuidor: <code>poas@falcon.test</code> / <code>demo123</code>
    </div>

    <div id="error" class="alert alert-error" style="display:none"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="correo@ejemplo.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-forest btn-full" id="submitBtn">Ingresar</button>
    </form>
  </div>

  <script type="module">
    import { api } from './js/api.js'

    const form = document.getElementById('loginForm')
    const errorEl = document.getElementById('error')
    const submitBtn = document.getElementById('submitBtn')

    form.addEventListener('submit', async (e) => {
      e.preventDefault()
      errorEl.style.display = 'none'
      submitBtn.disabled = true
      submitBtn.textContent = 'Ingresando...'

      try {
        const { token, user } = await api.post('/auth/login', {
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        })
        localStorage.setItem('falcon_token', token)
        window.location.href = user.role === 'admin' ? 'admin.html' : 'dashboard.html'
      } catch (err) {
        errorEl.textContent = err.message
        errorEl.style.display = 'block'
        submitBtn.disabled = false
        submitBtn.textContent = 'Ingresar'
      }
    })
  </script>
</body>
</html>
